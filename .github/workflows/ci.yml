name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Unit tests (Swift package)
        working-directory: LanGuardPackage
        run: swift test

      - name: Build app
        run: >
          xcodebuild
          -workspace LanGuard.xcworkspace
          -scheme LanGuard
          -configuration Debug
          -derivedDataPath .build
          CODE_SIGNING_ALLOWED=NO
          build
